<!-- Phase 6 — Week report: habit completion %, task aging, reward history,
     weekly rule status. Purely computed client-side from existing reads —
     no new Sheet tabs/columns, no OAuth (anon reads only, same as
     today.html's read side). -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Keystone — Report</title>
</head>
<body>
  <nav><a href="../">Today</a> | <a href="./plan-tomorrow.html">Plan Tomorrow</a> | <a href="./checkpoints.html">Checkpoints</a> | <a href="./report.html">Report</a></nav>
  <h1>Week Report</h1>
  <p id="status">Loading…</p>

  <section id="habit-completion">
    <h2>Habit completion (last 7 days)</h2>
    <ul id="habit-completion-list"></ul>
  </section>

  <section id="task-aging">
    <h2>Task aging</h2>
    <ul id="task-aging-list"></ul>
  </section>

  <section id="weekly-rules">
    <h2>Weekly rules</h2>
    <ul id="weekly-rules-list"></ul>
  </section>

  <section id="reward-history">
    <h2>Reward history</h2>
    <ul id="reward-history-list"></ul>
  </section>

  <script src="./config.local.js"></script>
  <script type="module">
    import * as provider from '../shared/keystone-provider.js';
    import { isTaskStale, computeHabitCompletionRate, evaluateWeeklyRule } from '../shared/keystone-rules.js';

    const REPORT_WINDOW_DAYS = 7;

    const statusEl = document.getElementById('status');
    const habitCompletionListEl = document.getElementById('habit-completion-list');
    const taskAgingListEl = document.getElementById('task-aging-list');
    const weeklyRulesListEl = document.getElementById('weekly-rules-list');
    const rewardHistoryListEl = document.getElementById('reward-history-list');

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function isoDaysAgo(dateISO, days) {
      const d = new Date(`${dateISO}T00:00:00Z`);
      d.setUTCDate(d.getUTCDate() - days);
      return d.toISOString().slice(0, 10);
    }

    function renderHabitCompletion(habits, habitLogRange, today) {
      habitCompletionListEl.innerHTML = habits.map((habit) => {
        const { doneCount, windowDays, rate } = computeHabitCompletionRate(habit, habitLogRange, today, REPORT_WINDOW_DAYS);
        return `<li>${habit.label}: ${doneCount}/${windowDays} (${Math.round(rate * 100)}%)</li>`;
      }).join('') || '<em>No habits yet.</em>';
    }

    function renderTaskAging(tasks, today) {
      const openTasks = tasks.filter((t) => t.status === 'pending');
      taskAgingListEl.innerHTML = openTasks.map((task) => {
        const stale = isTaskStale(task, today) ? ' [stale]' : '';
        const referenceDate = task.lastCarriedDate || task.createdDate;
        return `<li>${task.label} — open since ${referenceDate}${stale}</li>`;
      }).join('') || '<em>No open tasks.</em>';
    }

    function renderWeeklyRules(weeklyRules, habitLogRange, today) {
      weeklyRulesListEl.innerHTML = weeklyRules.map((rule) => {
        const result = evaluateWeeklyRule(rule, habitLogRange, today);
        if (result.error) return `<li>${rule.metric}: ${result.error}</li>`;
        return `<li>${rule.metric}: ${result.count}/${result.target} — ${result.met ? 'met ✅' : 'not met'}</li>`;
      }).join('') || '<em>No weekly rules configured.</em>';
    }

    function renderRewardHistory(rewardLog) {
      rewardHistoryListEl.innerHTML = rewardLog.map((row) =>
        `<li>${row.date}: ${row.rewardChosen} (${row.status}, granted by ${row.grantedBy})</li>`
      ).join('') || '<em>No rewards granted yet.</em>';
    }

    async function run() {
      const params = new URLSearchParams(window.location.search);
      const requestedPersonId = params.get('personId');
      const today = todayISO();

      const people = await provider.getPeople();
      const currentPerson = people.find((p) => p.personId === requestedPersonId) || people[0];

      if (!currentPerson) {
        statusEl.textContent = 'No people found — add one from the Today page first.';
        return;
      }

      const fromDate = isoDaysAgo(today, REPORT_WINDOW_DAYS - 1);
      const [habits, tasks, habitLogRange, weeklyRules, rewardLog] = await Promise.all([
        provider.getHabits(currentPerson.personId),
        provider.getTasks(currentPerson.personId),
        provider.getHabitLogRange(currentPerson.personId, fromDate, today),
        provider.getWeeklyRules(currentPerson.personId),
        provider.getRewardLog(currentPerson.personId),
      ]);

      statusEl.textContent = `Report for ${currentPerson.name} — ${fromDate} to ${today}`;
      document.querySelectorAll('nav a').forEach((a) => { a.href += `?personId=${currentPerson.personId}`; });

      renderHabitCompletion(habits, habitLogRange, today);
      renderTaskAging(tasks, today);
      renderWeeklyRules(weeklyRules, habitLogRange, today);
      renderRewardHistory(rewardLog);
    }

    run().catch((err) => {
      statusEl.textContent = `Failed to load: ${err.message}`;
      console.error(err);
    });
  </script>
</body>
</html>
