<!-- Phase 5 — Checkpoints, reward catalog, and the grant flow. Group
     today's habits/tasks into a checkpoint with a reward (fixed or
     open/pool), maintain the reward catalog, and let a parent grant a
     reward at any completion % — never automatic. Entirely a write flow:
     OAuth required for everything here, same silent-refresh-first
     pattern as today.html/plan-tomorrow.html. -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Keystone — Checkpoints</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body.anon .write-control { display: none; }
    body:not(.anon) #sign-in { display: none; }
    #write-error { color: #b00020; }
  </style>
</head>
<body class="anon">
  <nav><a href="../">Today</a> | <a href="./plan-tomorrow.html">Plan Tomorrow</a> | <a href="./checkpoints.html">Checkpoints</a> | <a href="./report.html">Report</a></nav>
  <h1>Checkpoints</h1>
  <p id="status">Loading…</p>
  <button id="sign-in">Sign in</button>
  <p id="write-error"></p>

  <section id="today-checkpoints" class="write-control">
    <h2>Today's checkpoints</h2>
    <div id="checkpoints-list"></div>
  </section>

  <section id="create-checkpoint" class="write-control">
    <h2>Create a checkpoint</h2>
    <form id="create-checkpoint-form">
      <input id="checkpoint-label" type="text" placeholder="Label" required />
      <fieldset>
        <legend>Items (today's habits &amp; open tasks)</legend>
        <div id="checkpoint-items"></div>
      </fieldset>
      <label>
        Reward mode:
        <select id="checkpoint-reward-mode">
          <option value="fixed">Fixed</option>
          <option value="open">Open (pick from pool)</option>
        </select>
      </label>
      <fieldset>
        <legend>Reward(s) — single pick for fixed, multi-pick for open</legend>
        <div id="checkpoint-rewards"></div>
      </fieldset>
      <button type="submit">Create Checkpoint</button>
    </form>
  </section>

  <section id="reward-catalog" class="write-control">
    <h2>Reward catalog</h2>
    <div id="reward-catalog-list"></div>
    <form id="add-reward-form">
      <input id="reward-title" type="text" placeholder="Reward title" required />
      <input id="reward-tags" type="text" placeholder="tags (comma-separated)" />
      <button type="submit">Add Reward</button>
    </form>
  </section>

  <script src="./config.local.js"></script>
  <script type="module">
    import * as provider from '../shared/keystone-provider.js';
    import { isCheckpointReady, canGrantReward, resolveOpenRewardChoice } from '../shared/keystone-rules.js';
    import { requestSilentToken, requestSignIn } from '../shared/keystone-auth.js';

    const OAUTH_SCOPE = 'https://www.googleapis.com/auth/spreadsheets';

    const statusEl = document.getElementById('status');
    const signInBtn = document.getElementById('sign-in');
    const writeErrorEl = document.getElementById('write-error');
    const checkpointsListEl = document.getElementById('checkpoints-list');
    const checkpointItemsEl = document.getElementById('checkpoint-items');
    const checkpointRewardModeEl = document.getElementById('checkpoint-reward-mode');
    const checkpointRewardsEl = document.getElementById('checkpoint-rewards');
    const createCheckpointForm = document.getElementById('create-checkpoint-form');
    const rewardCatalogListEl = document.getElementById('reward-catalog-list');
    const addRewardForm = document.getElementById('add-reward-form');

    const today = todayISO();
    let currentPerson = null;
    let currentHabits = [];
    let currentTasks = [];
    let currentHabitLog = [];
    let currentCheckpoints = [];
    let currentRewardCatalog = [];

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function setAuthedState(isAuthed) {
      document.body.classList.toggle('anon', !isAuthed);
    }

    function showWriteError(message) {
      writeErrorEl.textContent = message;
    }

    function clearWriteError() {
      writeErrorEl.textContent = '';
    }

    function renderCheckpointItemOptions() {
      const habitOptions = currentHabits.map((h) =>
        `<label><input type="checkbox" class="item-check" value="${h.habitId}" /> ${h.label} (habit)</label>`
      );
      const taskOptions = currentTasks.filter((t) => t.status === 'pending').map((t) =>
        `<label><input type="checkbox" class="item-check" value="${t.taskId}" /> ${t.label} (task)</label>`
      );
      checkpointItemsEl.innerHTML = [...habitOptions, ...taskOptions].map((h) => `<div>${h}</div>`).join('') || '<em>Nothing to group yet.</em>';
    }

    function renderCheckpointRewardOptions() {
      const inputType = checkpointRewardModeEl.value === 'fixed' ? 'radio' : 'checkbox';
      checkpointRewardsEl.innerHTML = currentRewardCatalog.map((r) =>
        `<div><label><input type="${inputType}" name="checkpoint-reward" class="reward-check" value="${r.rewardId}" /> ${r.title}</label></div>`
      ).join('') || '<em>Add a reward to the catalog first.</em>';
    }

    async function handleGrant(checkpoint, rewardId, grantedBy) {
      clearWriteError();
      try {
        await provider.grantReward(checkpoint.checkpointId, rewardId, grantedBy || currentPerson.name);
        await reloadCheckpoints();
      } catch (err) {
        showWriteError(`Failed to grant reward: ${err.message}`);
      }
    }

    function renderCheckpoints() {
      checkpointsListEl.innerHTML = '';
      if (currentCheckpoints.length === 0) {
        checkpointsListEl.innerHTML = '<em>No checkpoints yet today.</em>';
        return;
      }
      currentCheckpoints.forEach((checkpoint) => {
        const ready = isCheckpointReady(checkpoint, currentHabitLog, currentTasks);
        const wrapper = document.createElement('div');
        wrapper.style.marginBottom = '0.75em';

        const readyRewards = resolveOpenRewardChoice(currentRewardCatalog, checkpoint.rewardIds);
        let grantControlsHtml = '';
        if (!canGrantReward(checkpoint)) {
          grantControlsHtml = '<em>Already granted.</em>';
        } else if (checkpoint.rewardMode === 'fixed') {
          const reward = readyRewards[0];
          grantControlsHtml = reward
            ? `<button class="grant-btn" data-reward-id="${reward.rewardId}">Grant "${reward.title}"</button>`
            : '<em>No reward configured.</em>';
        } else {
          const options = readyRewards.map((r) => `<option value="${r.rewardId}">${r.title}</option>`).join('');
          grantControlsHtml = `
            <select class="open-reward-select">${options}</select>
            <button class="grant-btn" data-open="true">Grant selected</button>
          `;
        }

        const grantedByHtml = canGrantReward(checkpoint)
          ? `<input type="text" class="granted-by-input" placeholder="Granted by" value="${currentPerson.name}" />`
          : '';

        wrapper.innerHTML = `
          <strong>${checkpoint.label}</strong> — ${checkpoint.status}${ready ? ' [ready to grant]' : ''}
          <div>${grantedByHtml} ${grantControlsHtml}</div>
        `;

        const grantBtn = wrapper.querySelector('.grant-btn');
        if (grantBtn) {
          grantBtn.addEventListener('click', () => {
            const rewardId = grantBtn.dataset.open
              ? wrapper.querySelector('.open-reward-select').value
              : grantBtn.dataset.rewardId;
            const grantedBy = wrapper.querySelector('.granted-by-input').value.trim();
            handleGrant(checkpoint, rewardId, grantedBy);
          });
        }

        checkpointsListEl.appendChild(wrapper);
      });
    }

    function renderRewardCatalog() {
      rewardCatalogListEl.innerHTML = '';
      currentRewardCatalog.forEach((reward) => {
        const row = document.createElement('div');
        const titleInput = document.createElement('input');
        titleInput.type = 'text';
        titleInput.value = reward.title;
        const tagsInput = document.createElement('input');
        tagsInput.type = 'text';
        tagsInput.value = reward.tags.join(',');
        const saveBtn = document.createElement('button');
        saveBtn.textContent = 'Save';
        saveBtn.addEventListener('click', async () => {
          clearWriteError();
          try {
            const tags = tagsInput.value.split(',').map((t) => t.trim()).filter(Boolean);
            await provider.updateReward(reward.rewardId, titleInput.value.trim(), tags);
            await reloadRewardCatalog();
          } catch (err) {
            showWriteError(`Failed to update reward: ${err.message}`);
          }
        });
        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Delete';
        deleteBtn.addEventListener('click', async () => {
          clearWriteError();
          try {
            await provider.deleteReward(reward.rewardId);
            await reloadRewardCatalog();
          } catch (err) {
            showWriteError(`Failed to delete reward: ${err.message}`);
          }
        });
        row.appendChild(titleInput);
        row.appendChild(tagsInput);
        row.appendChild(saveBtn);
        row.appendChild(deleteBtn);
        rewardCatalogListEl.appendChild(row);
      });
    }

    async function reloadCheckpoints() {
      currentCheckpoints = await provider.getCheckpoints(currentPerson.personId, today);
      renderCheckpoints();
    }

    async function reloadRewardCatalog() {
      currentRewardCatalog = await provider.getRewardCatalog(currentPerson.personId);
      renderRewardCatalog();
      renderCheckpointRewardOptions();
    }

    checkpointRewardModeEl.addEventListener('change', renderCheckpointRewardOptions);

    createCheckpointForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const label = document.getElementById('checkpoint-label').value.trim();
      const itemIds = [...checkpointItemsEl.querySelectorAll('.item-check:checked')].map((el) => el.value);
      const rewardMode = checkpointRewardModeEl.value;
      const rewardIds = [...checkpointRewardsEl.querySelectorAll('.reward-check:checked')].map((el) => el.value);
      if (!label || itemIds.length === 0 || rewardIds.length === 0) {
        showWriteError('Label, at least one item, and at least one reward are required.');
        return;
      }

      const submitBtn = createCheckpointForm.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      clearWriteError();
      try {
        await provider.upsertCheckpoint({
          date: today,
          personId: currentPerson.personId,
          label,
          itemIds,
          rewardMode,
          rewardIds,
          status: 'pending',
        });
        createCheckpointForm.reset();
        renderCheckpointItemOptions();
        renderCheckpointRewardOptions();
        await reloadCheckpoints();
      } catch (err) {
        showWriteError(`Failed to create checkpoint: ${err.message}`);
      } finally {
        submitBtn.disabled = false;
      }
    });

    addRewardForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const title = document.getElementById('reward-title').value.trim();
      const tags = document.getElementById('reward-tags').value.split(',').map((t) => t.trim()).filter(Boolean);
      if (!title) return;

      const submitBtn = addRewardForm.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      clearWriteError();
      try {
        await provider.addReward(currentPerson.personId, title, tags);
        addRewardForm.reset();
        await reloadRewardCatalog();
      } catch (err) {
        showWriteError(`Failed to add reward: ${err.message}`);
      } finally {
        submitBtn.disabled = false;
      }
    });

    async function tryAutoSignIn() {
      try {
        const token = await requestSilentToken(window.KEYSTONE_CONFIG.oauthClientId, OAUTH_SCOPE);
        if (token) {
          provider.setAccessToken(token);
          setAuthedState(true);
        }
      } catch (err) {
        console.warn('Silent sign-in failed, falling back to sign-in button.', err);
      }
    }

    signInBtn.addEventListener('click', async () => {
      signInBtn.disabled = true;
      clearWriteError();
      try {
        const token = await requestSignIn(window.KEYSTONE_CONFIG.oauthClientId, OAUTH_SCOPE);
        provider.setAccessToken(token);
        setAuthedState(true);
      } catch (err) {
        showWriteError(`Sign-in failed: ${err.message}`);
      } finally {
        signInBtn.disabled = false;
      }
    });

    async function run() {
      const params = new URLSearchParams(window.location.search);
      const requestedPersonId = params.get('personId');

      const people = await provider.getPeople();
      currentPerson = people.find((p) => p.personId === requestedPersonId) || people[0];

      if (!currentPerson) {
        statusEl.textContent = 'No people found — add one from the Today page first.';
        return;
      }

      const [habits, tasks, habitLog, checkpoints, rewardCatalog] = await Promise.all([
        provider.getHabits(currentPerson.personId),
        provider.getTasks(currentPerson.personId),
        provider.getHabitLog(currentPerson.personId, today),
        provider.getCheckpoints(currentPerson.personId, today),
        provider.getRewardCatalog(currentPerson.personId),
      ]);

      currentHabits = habits;
      currentTasks = tasks;
      currentHabitLog = habitLog;
      currentCheckpoints = checkpoints;
      currentRewardCatalog = rewardCatalog;

      statusEl.textContent = `Checkpoints for ${currentPerson.name}`;
      document.querySelectorAll('nav a').forEach((a) => { a.href += `?personId=${currentPerson.personId}`; });

      renderCheckpointItemOptions();
      renderCheckpointRewardOptions();
      renderCheckpoints();
      renderRewardCatalog();

      await tryAutoSignIn();
    }

    run().catch((err) => {
      statusEl.textContent = `Failed to load: ${err.message}`;
      console.error(err);
    });
  </script>
</body>
</html>
