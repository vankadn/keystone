<!-- Phase 2 — one-time (idempotent-repeatable) sheet setup. Signs in via
     OAuth, then calls initializeSheet() to create/verify the 8 tabs. This
     is what a bring-your-own-sheet user hits first. -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Keystone — Setup</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <h1>Setup</h1>
  <button id="sign-in">Sign in</button>
  <button id="initialize" disabled>Initialize Sheet</button>
  <p id="status">Not signed in.</p>
  <pre id="result"></pre>

  <script src="./config.local.js"></script>
  <script type="module">
    import { initializeSheet } from '../shared/keystone-provider.js';

    const signInBtn = document.getElementById('sign-in');
    const initBtn = document.getElementById('initialize');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');

    let accessToken = null;
    let tokenClient = null;

    signInBtn.addEventListener('click', () => {
      if (!window.google) {
        statusEl.textContent = 'Google Identity Services script not loaded yet — try again in a moment.';
        return;
      }
      if (!tokenClient) {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: window.KEYSTONE_CONFIG.oauthClientId,
          scope: 'https://www.googleapis.com/auth/spreadsheets',
          callback: (response) => {
            if (response.error) {
              statusEl.textContent = `Sign-in failed: ${response.error}`;
              return;
            }
            accessToken = response.access_token;
            statusEl.textContent = 'Signed in. Ready to initialize.';
            initBtn.disabled = false;
          },
        });
      }
      tokenClient.requestAccessToken();
    });

    initBtn.addEventListener('click', async () => {
      if (!accessToken) {
        statusEl.textContent = 'Sign in first.';
        return;
      }
      statusEl.textContent = 'Initializing…';
      resultEl.textContent = '';
      try {
        const sheetId = window.KEYSTONE_CONFIG.sheetId;
        const outcome = await initializeSheet(sheetId, accessToken);
        statusEl.textContent = 'Done.';
        resultEl.textContent = JSON.stringify(outcome, null, 2);
      } catch (err) {
        statusEl.textContent = `Failed: ${err.message}`;
        console.error(err);
      }
    });
  </script>
</body>
</html>
