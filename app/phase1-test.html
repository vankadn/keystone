<!-- Scratch harness for Phase 1 — exercises keystone-provider.js against mock
     data. Not linked from any nav, not part of the real app. Open this file
     directly and check the console. -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Keystone — Phase 1 provider test</title>
</head>
<body>
  <p>Open the console to see provider output.</p>
  <script type="module">
    import * as provider from '../shared/keystone-provider.js';

    async function run() {
      const people = await provider.getPeople();
      console.log('getPeople', people);

      for (const person of people) {
        const { personId } = person;
        console.log(`--- ${personId} ---`);
        console.log('getHabits', await provider.getHabits(personId));
        console.log('getTasks', await provider.getTasks(personId));
        console.log('getHabitLog(2026-07-16)', await provider.getHabitLog(personId, '2026-07-16'));
        console.log('getCheckpoints(2026-07-16)', await provider.getCheckpoints(personId, '2026-07-16'));
        console.log('getRewardCatalog', await provider.getRewardCatalog(personId));
        console.log('getWeeklyRules', await provider.getWeeklyRules(personId));
        console.log('getRewardLog', await provider.getRewardLog(personId));
      }

      console.log('getSheetId', await provider.getSheetId());

      console.log('setHabitStatus', await provider.setHabitStatus('2026-07-17', 'h1', 'done'));
      console.log('setTaskStatus (still pending)', await provider.setTaskStatus('t1', 'pending'));
      console.log('setTaskStatus (done)', await provider.setTaskStatus('t2', 'done'));
      console.log('upsertCheckpoint (new)', await provider.upsertCheckpoint({
        date: '2026-07-17',
        personId: 'nyra',
        checkpointId: 'cp3',
        label: 'Test checkpoint',
        itemIds: ['h1'],
        rewardMode: 'fixed',
        rewardIds: ['r1'],
        status: 'pending',
      }));
      console.log('grantReward', await provider.grantReward('cp2', 'r3', 'nyra'));
    }

    run().catch((err) => console.error('Phase 1 provider test failed', err));
  </script>
</body>
</html>
