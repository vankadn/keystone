<!-- Phase 3 — "Today" screen with live writes. Anonymous visitors get a
     read-only view (body.anon); a silent or explicit OAuth sign-in
     unlocks the habit/task checkboxes. Unstyled, still no Plan
     Tomorrow/checkpoints UI/reward granting (Phase 4/5). -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Keystone — Today</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body.anon .write-control { display: none; }
    body:not(.anon) #sign-in { display: none; }
    #write-error { color: #b00020; }
  </style>
</head>
<body class="anon">
  <h1>Today</h1>
  <p id="status">Loading…</p>
  <button id="sign-in">Sign in</button>
  <p id="write-error"></p>
  <section id="add-person" class="write-control" style="display:none">
    <h2>Add Person</h2>
    <form id="add-person-form">
      <input id="add-person-name" type="text" placeholder="Name" required />
      <select id="add-person-theme">
        <option value="Playful">Playful</option>
        <option value="Minimal">Minimal</option>
        <option value="Warm">Warm</option>
      </select>
      <button type="submit">Add Person</button>
    </form>
  </section>
  <section id="habits"></section>
  <section id="tasks"></section>
  <section id="checkpoints"></section>

  <script src="./config.local.js"></script>
  <script type="module">
    import * as provider from '../shared/keystone-provider.js';
    import { isTaskStale, isCheckpointReady, isValidStatusTransition } from '../shared/keystone-rules.js';
    import { requestSilentToken, requestSignIn } from '../shared/keystone-auth.js';

    const OAUTH_SCOPE = 'https://www.googleapis.com/auth/spreadsheets';

    const statusEl = document.getElementById('status');
    const signInBtn = document.getElementById('sign-in');
    const writeErrorEl = document.getElementById('write-error');
    const addPersonEl = document.getElementById('add-person');
    const addPersonForm = document.getElementById('add-person-form');
    const habitsEl = document.getElementById('habits');
    const tasksEl = document.getElementById('tasks');
    const checkpointsEl = document.getElementById('checkpoints');

    const today = todayISO();
    let currentPerson = null;
    let currentHabits = [];
    let currentTasks = [];
    let currentHabitLog = [];
    let currentCheckpoints = [];

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function setAuthedState(isAuthed) {
      document.body.classList.toggle('anon', !isAuthed);
    }

    function showWriteError(message) {
      writeErrorEl.textContent = message;
    }

    function clearWriteError() {
      writeErrorEl.textContent = '';
    }

    async function handleHabitToggle(habit, checkbox, previousStatus) {
      const toStatus = checkbox.checked ? 'done' : 'missed';
      if (!isValidStatusTransition('habit', previousStatus, toStatus)) {
        checkbox.checked = !checkbox.checked;
        return;
      }
      checkbox.disabled = true;
      clearWriteError();
      try {
        await provider.setHabitStatus(today, habit.habitId, toStatus);
        currentHabitLog = currentHabitLog.filter((row) => row.habitId !== habit.habitId);
        currentHabitLog.push({ date: today, personId: currentPerson.personId, habitId: habit.habitId, status: toStatus, checkpointId: '' });
        renderCheckpoints();
      } catch (err) {
        checkbox.checked = !checkbox.checked;
        showWriteError(`Failed to save "${habit.label}": ${err.message}`);
      } finally {
        checkbox.disabled = false;
      }
    }

    async function handleTaskToggle(task, checkbox) {
      const previousStatus = task.status;
      const toStatus = checkbox.checked ? 'done' : 'pending';
      if (!isValidStatusTransition('task', previousStatus, toStatus)) {
        checkbox.checked = !checkbox.checked;
        return;
      }
      checkbox.disabled = true;
      clearWriteError();
      try {
        const updated = await provider.setTaskStatus(task.taskId, toStatus);
        task.status = updated.status;
        task.lastCarriedDate = updated.lastCarriedDate;
        renderTasks();
        renderCheckpoints();
      } catch (err) {
        checkbox.checked = !checkbox.checked;
        showWriteError(`Failed to save "${task.label}": ${err.message}`);
      } finally {
        checkbox.disabled = false;
      }
    }

    function renderHabits() {
      habitsEl.innerHTML = '<h2>Habits</h2>';
      currentHabits.forEach((habit) => {
        const logRow = currentHabitLog.find((row) => row.habitId === habit.habitId);
        const status = logRow ? logRow.status : null;

        const row = document.createElement('div');
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'write-control';
        checkbox.checked = status === 'done';
        checkbox.addEventListener('change', () => handleHabitToggle(habit, checkbox, status));

        row.appendChild(checkbox);
        row.appendChild(document.createTextNode(` ${habit.label} — ${status || 'not logged'}`));
        habitsEl.appendChild(row);
      });
    }

    function renderTasks() {
      tasksEl.innerHTML = '<h2>Tasks</h2>';
      currentTasks.forEach((task) => {
        const stale = isTaskStale(task, today) ? ' [stale]' : '';

        const row = document.createElement('div');
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'write-control';
        checkbox.checked = task.status === 'done';
        checkbox.addEventListener('change', () => handleTaskToggle(task, checkbox));

        row.appendChild(checkbox);
        row.appendChild(document.createTextNode(` ${task.label} — ${task.status}${stale}`));
        tasksEl.appendChild(row);
      });
    }

    function renderCheckpoints() {
      checkpointsEl.innerHTML = '<h2>Checkpoints</h2>' + currentCheckpoints.map((checkpoint) => {
        const ready = isCheckpointReady(checkpoint, currentHabitLog, currentTasks) ? ' [ready to grant]' : '';
        return `<div>${checkpoint.label} — ${checkpoint.status}${ready}</div>`;
      }).join('');
    }

    async function tryAutoSignIn() {
      try {
        const token = await requestSilentToken(window.KEYSTONE_CONFIG.oauthClientId, OAUTH_SCOPE);
        if (token) {
          provider.setAccessToken(token);
          setAuthedState(true);
        }
      } catch (err) {
        console.warn('Silent sign-in failed, falling back to sign-in button.', err);
      }
    }

    signInBtn.addEventListener('click', async () => {
      signInBtn.disabled = true;
      clearWriteError();
      try {
        const token = await requestSignIn(window.KEYSTONE_CONFIG.oauthClientId, OAUTH_SCOPE);
        provider.setAccessToken(token);
        setAuthedState(true);
      } catch (err) {
        showWriteError(`Sign-in failed: ${err.message}`);
      } finally {
        signInBtn.disabled = false;
      }
    });

    addPersonForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const name = document.getElementById('add-person-name').value.trim();
      const theme = document.getElementById('add-person-theme').value;
      if (!name) return;

      const submitBtn = addPersonForm.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      clearWriteError();
      try {
        const person = await provider.addPerson(name, theme);
        const url = new URL(window.location.href);
        url.searchParams.set('personId', person.personId);
        window.location.href = url.toString();
      } catch (err) {
        showWriteError(`Failed to add person: ${err.message}`);
        submitBtn.disabled = false;
      }
    });

    async function run() {
      const params = new URLSearchParams(window.location.search);
      const requestedPersonId = params.get('personId');

      const people = await provider.getPeople();
      currentPerson = people.find((p) => p.personId === requestedPersonId) || people[0];

      if (!currentPerson) {
        statusEl.textContent = 'No people yet — sign in to add the first person.';
        addPersonEl.style.display = '';
        await tryAutoSignIn();
        return;
      }

      const [habits, tasks, habitLog, checkpoints] = await Promise.all([
        provider.getHabits(currentPerson.personId),
        provider.getTasks(currentPerson.personId),
        provider.getHabitLog(currentPerson.personId, today),
        provider.getCheckpoints(currentPerson.personId, today),
      ]);

      currentHabits = habits;
      currentTasks = tasks;
      currentHabitLog = habitLog;
      currentCheckpoints = checkpoints;

      statusEl.textContent = `Showing ${today} for ${currentPerson.name}`;

      renderHabits();
      renderTasks();
      renderCheckpoints();

      await tryAutoSignIn();
    }

    run().catch((err) => {
      statusEl.textContent = `Failed to load: ${err.message}`;
      console.error(err);
    });
  </script>
</body>
</html>
